<div class="min-h-screen bg-gray-50">
  <header class="sticky top-0 z-10 border-b border-gray-200 bg-white">
    <div class="mx-auto flex max-w-2xl items-center justify-between px-4 py-3">
      <a routerLink="/" class="text-lg font-bold text-gray-900">
        Só Vale Reclamar
      </a>

      @if (isAuthenticated()) {
        <div class="flex items-center gap-3 text-sm">
          <span class="text-gray-600">u/{{ user()?.username }}</span>
          <button
            type="button"
            (click)="logout()"
            class="font-medium text-gray-900 hover:underline"
          >
            Sair
          </button>
        </div>
      } @else {
        <div class="flex items-center gap-3 text-sm">
          <a routerLink="/auth/login" class="font-medium text-gray-900 hover:underline">
            Entrar
          </a>
          <a
            routerLink="/auth/register"
            class="rounded-full bg-gray-900 px-3 py-1.5 font-medium text-white hover:bg-gray-700"
          >
            Criar conta
          </a>
        </div>
      }
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
