@if (step() === 'form') {
  <h1 class="mb-4 text-lg font-semibold text-gray-900">Criar conta</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-3">
    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="username">Usuário</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        autocomplete="nickname"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="form.controls.username" />
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="email">E-mail</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="username email"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="form.controls.email" />
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="password">Senha</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="form.controls.password" />
      <p class="mt-1 text-xs text-gray-500">Mínimo de 8 caracteres.</p>
    </div>

    @if (error()) {
      <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
    }

    <button
      type="submit"
      [disabled]="loading()"
      class="mt-1 inline-flex items-center justify-center gap-2 rounded-full bg-gray-900 px-4 py-2 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-50"
    >
      @if (loading()) {
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
          aria-hidden="true"
        ></span>
      }
      {{ loading() ? 'Criando…' : 'Criar conta' }}
    </button>
  </form>

  <p class="mt-4 text-center text-sm text-gray-600">
    Já tem conta?
    <a routerLink="/auth/login" class="font-medium text-gray-900 hover:underline">Entrar</a>
  </p>
} @else {
  <h1 class="mb-4 text-lg font-semibold text-gray-900">Confirme seu e-mail</h1>
  <p class="mb-4 text-sm text-gray-600">
    Enviamos um código de verificação para o seu e-mail.
  </p>

  <form [formGroup]="confirmForm" (ngSubmit)="confirm()" class="flex flex-col gap-3">
    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="code">Código</label>
      <input
        id="code"
        type="text"
        formControlName="code"
        autocomplete="one-time-code"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="confirmForm.controls.code" />
    </div>

    @if (error()) {
      <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
    }

    <button
      type="submit"
      [disabled]="loading()"
      class="mt-1 inline-flex items-center justify-center gap-2 rounded-full bg-gray-900 px-4 py-2 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-50"
    >
      @if (loading()) {
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
          aria-hidden="true"
        ></span>
      }
      {{ loading() ? 'Confirmando…' : 'Confirmar' }}
    </button>
  </form>
}
