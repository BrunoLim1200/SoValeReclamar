@if (step() === 'request') {
  <h1 class="mb-4 text-lg font-semibold text-gray-900">Recuperar senha</h1>

  <form [formGroup]="requestForm" (ngSubmit)="requestCode()" class="flex flex-col gap-3">
    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="username">Usuário</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        autocomplete="username"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="requestForm.controls.username" />
    </div>

    @if (error()) {
      <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
    }

    <button
      type="submit"
      [disabled]="loading()"
      class="mt-1 inline-flex items-center justify-center gap-2 rounded-full bg-gray-900 px-4 py-2 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-50"
    >
      @if (loading()) {
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
          aria-hidden="true"
        ></span>
      }
      {{ loading() ? 'Enviando…' : 'Enviar código' }}
    </button>
  </form>
} @else {
  <h1 class="mb-4 text-lg font-semibold text-gray-900">Nova senha</h1>
  <p class="mb-4 text-sm text-gray-600">
    Enviamos um código de verificação para o seu e-mail.
  </p>

  <form [formGroup]="resetForm" (ngSubmit)="reset()" class="flex flex-col gap-3">
    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="code">Código</label>
      <input
        id="code"
        type="text"
        formControlName="code"
        autocomplete="one-time-code"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="resetForm.controls.code" />
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700" for="newPassword">Nova senha</label>
      <input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gray-900 focus:outline-none"
      />
      <app-field-error [control]="resetForm.controls.newPassword" />
      <p class="mt-1 text-xs text-gray-500">Mínimo de 8 caracteres.</p>
    </div>

    @if (error()) {
      <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
    }

    <button
      type="submit"
      [disabled]="loading()"
      class="mt-1 inline-flex items-center justify-center gap-2 rounded-full bg-gray-900 px-4 py-2 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-50"
    >
      @if (loading()) {
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
          aria-hidden="true"
        ></span>
      }
      {{ loading() ? 'Salvando…' : 'Salvar nova senha' }}
    </button>
  </form>
}

<p class="mt-4 text-center text-sm text-gray-600">
  <a routerLink="/auth/login" class="font-medium text-gray-900 hover:underline">Voltar para entrar</a>
</p>
