<section class="mx-auto max-w-2xl px-4 py-6">
  <h1 class="mb-4 text-xl font-semibold text-gray-900">Feed</h1>

  <ul class="flex flex-col gap-4">
    @for (item of items(); track item.id) {
      <li>
        <app-complaint-card [item]="item" />
      </li>
    }
  </ul>

  @if (loading()) {
    <p class="py-6 text-center text-sm text-gray-500">Carregando…</p>
  }

  @if (error()) {
    <div class="py-6 text-center">
      <p class="text-sm text-red-600">{{ error() }}</p>
      <button
        type="button"
        (click)="retry()"
        class="mt-2 rounded-full bg-gray-900 px-4 py-1.5 text-sm font-medium text-white hover:bg-gray-700"
      >
        Tentar novamente
      </button>
    </div>
  }

  @if (!loading() && !error() && items().length === 0) {
    <p class="py-6 text-center text-sm text-gray-500">
      Nenhuma reclamação por aqui ainda.
    </p>
  }

  <!-- Infinite-scroll sentinel: intersecting it requests the next page. -->
  <div #sentinel aria-hidden="true" class="h-px w-full"></div>
</section>
