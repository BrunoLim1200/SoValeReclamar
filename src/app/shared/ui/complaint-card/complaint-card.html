<article
  class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition hover:shadow-md"
>
  <header class="mb-2 flex items-center gap-2 text-xs text-gray-500">
    <span class="rounded-full bg-gray-100 px-2 py-0.5 font-medium text-gray-700">
      {{ item().entity.name }}
    </span>
    <span>·</span>
    <span>u/{{ item().author.username }}</span>
    <span>·</span>
    <time [attr.datetime]="item().createdAt">
      {{ item().createdAt | date: 'dd/MM/yyyy' }}
    </time>
  </header>

  <h2 class="mb-1 text-base font-semibold text-gray-900">{{ item().title }}</h2>
  <p class="whitespace-pre-line text-sm text-gray-700">{{ item().content }}</p>

  @if (item().mediaUrl; as mediaUrl) {
    <img
      [src]="mediaUrl"
      [alt]="item().title"
      loading="lazy"
      class="mt-3 max-h-96 w-full rounded-lg object-cover"
    />
  }

  <footer class="mt-3 flex items-center gap-1.5 text-sm text-gray-600">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="currentColor"
      class="h-4 w-4"
      aria-hidden="true"
    >
      <path
        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
      />
    </svg>
    <span>{{ item().corroborationCount }}</span>
    <span class="text-gray-400">corroboraram</span>
  </footer>
</article>
